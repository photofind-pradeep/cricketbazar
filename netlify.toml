# netlify.toml
# ═══════════════════════════════════════════════════════════
#  CricketBazar — Netlify Configuration
# ═══════════════════════════════════════════════════════════

[build]
  command         = "npm install && npm run build"
  publish         = "dist"
  functions       = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# Route /api/cricket/* to our serverless function
[[redirects]]
  from    = "/api/cricket"
  to      = "/.netlify/functions/cricket"
  status  = 200

# All other routes go to React app (SPA routing)
[[redirects]]
  from    = "/*"
  to      = "/index.html"
  status  = 200

# Headers for service worker & PWA
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control         = "no-cache"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Content-Type = "application/manifest+json"

# Security headers for all pages
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"

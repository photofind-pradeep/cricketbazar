[build]
  command         = "npm install && npx vite build"
  publish         = "dist"
  functions       = "netlify/functions"

[build.environment]
  NODE_VERSION    = "20"

[[redirects]]
  from    = "/api/cricket"
  to      = "/.netlify/functions/cricket"
  status  = 200

[[redirects]]
  from    = "/*"
  to      = "/index.html"
  status  = 200

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control          = "no-cache"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Content-Type = "application/manifest+json"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
